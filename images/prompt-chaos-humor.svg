<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 640" role="img" aria-labelledby="title desc">
  <title id="title">Illustration humoristique sur la vitesse gagnée avec l'IA</title>
  <desc id="desc">Un agent IA livre une interface très vite pendant que le développeur jongle encore avec les prompts, le diff, les logs et les spécifications.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#141414"/>
      <stop offset="100%" stop-color="#1e1e24"/>
    </linearGradient>
    <linearGradient id="panel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#26262d" stop-opacity="0.96"/>
      <stop offset="100%" stop-color="#1b1b22" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="pinkStroke" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#cf0063"/>
      <stop offset="100%" stop-color="#ff5ca8"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="960" height="640" rx="28" fill="url(#bg)"/>
  <circle cx="160" cy="110" r="120" fill="#cf0063" opacity="0.10"/>
  <circle cx="805" cy="530" r="150" fill="#cf0063" opacity="0.08"/>

  <text x="480" y="66" text-anchor="middle" fill="#ffffff" font-size="30" font-weight="700" font-family="Inter, Arial, sans-serif">
    L'IA a deja livre l'ecran.
  </text>
  <text x="480" y="104" text-anchor="middle" fill="#c5cad8" font-size="20" font-weight="500" font-family="Inter, Arial, sans-serif">
    Mon cerveau ouvre encore 6 onglets.
  </text>

  <rect x="54" y="146" width="388" height="430" rx="28" fill="url(#panel)" stroke="url(#pinkStroke)" stroke-width="2"/>
  <rect x="518" y="146" width="388" height="430" rx="28" fill="url(#panel)" stroke="#3b3d46" stroke-width="2"/>

  <text x="88" y="194" fill="#ffffff" font-size="24" font-weight="700" font-family="Inter, Arial, sans-serif">
    Agent IA
  </text>
  <text x="88" y="226" fill="#f5b4d4" font-size="16" font-weight="600" font-family="Inter, Arial, sans-serif">
    resultat visible en 45 secondes
  </text>

  <rect x="88" y="258" width="320" height="186" rx="20" fill="#13141a" stroke="#4c4f5c" stroke-width="2"/>
  <rect x="104" y="274" width="288" height="24" rx="12" fill="#252730"/>
  <circle cx="125" cy="286" r="6" fill="#ff6a95"/>
  <circle cx="145" cy="286" r="6" fill="#ffd166"/>
  <circle cx="165" cy="286" r="6" fill="#69db7c"/>
  <rect x="120" y="322" width="104" height="88" rx="16" fill="#cf0063" opacity="0.18" stroke="#ff5ca8" stroke-width="2"/>
  <rect x="238" y="322" width="136" height="18" rx="9" fill="#ffffff" opacity="0.86"/>
  <rect x="238" y="352" width="118" height="14" rx="7" fill="#d8dce8" opacity="0.78"/>
  <rect x="238" y="378" width="86" height="14" rx="7" fill="#d8dce8" opacity="0.58"/>
  <text x="172" y="374" text-anchor="middle" fill="#ffffff" font-size="30" font-family="Inter, Arial, sans-serif">UX</text>

  <rect x="88" y="470" width="320" height="72" rx="18" fill="#17191f" stroke="#3f414c" stroke-width="2"/>
  <rect x="108" y="490" width="108" height="16" rx="8" fill="#f5b4d4"/>
  <rect x="108" y="514" width="76" height="12" rx="6" fill="#bfc7d9" opacity="0.75"/>
  <rect x="270" y="490" width="106" height="30" rx="15" fill="#cf0063" filter="url(#glow)"/>
  <text x="323" y="512" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="700" font-family="Inter, Arial, sans-serif">
    compile du premier coup
  </text>

  <text x="552" y="194" fill="#ffffff" font-size="24" font-weight="700" font-family="Inter, Arial, sans-serif">
    Developpeur
  </text>
  <text x="552" y="226" fill="#c5cad8" font-size="16" font-weight="600" font-family="Inter, Arial, sans-serif">
    orchestration, verification, relecture
  </text>

  <circle cx="710" cy="322" r="78" fill="#181a22" stroke="#515463" stroke-width="2"/>
  <circle cx="710" cy="300" r="34" fill="#232633"/>
  <rect x="652" y="350" width="116" height="110" rx="26" fill="#232633"/>
  <circle cx="690" cy="294" r="5" fill="#ffffff"/>
  <circle cx="730" cy="294" r="5" fill="#ffffff"/>
  <path d="M692 314 Q710 330 728 314" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round"/>

  <g font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">
    <rect x="562" y="260" width="116" height="44" rx="16" fill="#cf0063" opacity="0.18" stroke="#ff5ca8" stroke-width="2"/>
    <text x="620" y="288" text-anchor="middle" fill="#ffffff">Prompt</text>

    <rect x="758" y="250" width="110" height="44" rx="16" fill="#1d2630" stroke="#6d7386" stroke-width="2"/>
    <text x="813" y="278" text-anchor="middle" fill="#ffffff">Spec</text>

    <rect x="804" y="336" width="90" height="44" rx="16" fill="#1d2630" stroke="#6d7386" stroke-width="2"/>
    <text x="849" y="364" text-anchor="middle" fill="#ffffff">Diff</text>

    <rect x="740" y="446" width="118" height="44" rx="16" fill="#1d2630" stroke="#6d7386" stroke-width="2"/>
    <text x="799" y="474" text-anchor="middle" fill="#ffffff">Logs</text>

    <rect x="560" y="438" width="124" height="44" rx="16" fill="#1d2630" stroke="#6d7386" stroke-width="2"/>
    <text x="622" y="466" text-anchor="middle" fill="#ffffff">Tests</text>

    <rect x="538" y="346" width="118" height="44" rx="16" fill="#1d2630" stroke="#6d7386" stroke-width="2"/>
    <text x="597" y="374" text-anchor="middle" fill="#ffffff">Contexte</text>
  </g>

  <g stroke="#8b93a7" stroke-width="3" stroke-linecap="round" opacity="0.8">
    <path d="M668 286 C690 276 700 268 706 246"/>
    <path d="M752 284 C770 278 787 272 808 296"/>
    <path d="M786 352 C800 349 818 353 826 381"/>
    <path d="M770 438 C754 430 736 432 720 448"/>
    <path d="M650 446 C668 430 680 424 694 430"/>
    <path d="M644 356 C664 352 676 350 690 350"/>
  </g>

  <rect x="566" y="516" width="306" height="34" rx="17" fill="#13141a" stroke="#3d414f" stroke-width="2"/>
  <text x="719" y="538" text-anchor="middle" fill="#f2f5fb" font-size="15" font-weight="600" font-family="Inter, Arial, sans-serif">
    Plus rapide a livrer, pas plus simple a piloter.
  </text>
</svg>
