<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">Illustration d'un IDE moderne</title>
  <desc id="desc">Un IDE stylise avec explorateur de fichiers, editeur de code, terminal et panneau de diff.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#111217"/>
      <stop offset="100%" stop-color="#1a1d28"/>
    </linearGradient>
    <linearGradient id="chrome" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#262a36"/>
      <stop offset="100%" stop-color="#1b1e27"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#cf0063"/>
      <stop offset="100%" stop-color="#ff6cae"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1280" height="760" rx="34" fill="url(#bg)"/>
  <circle cx="210" cy="120" r="170" fill="#cf0063" opacity="0.11"/>
  <circle cx="1080" cy="660" r="200" fill="#5b9cff" opacity="0.10"/>

  <rect x="64" y="54" width="1152" height="652" rx="28" fill="#151823" stroke="#404659" stroke-width="2"/>
  <rect x="64" y="54" width="1152" height="58" rx="28" fill="url(#chrome)"/>
  <rect x="64" y="84" width="1152" height="28" fill="url(#chrome)"/>

  <circle cx="102" cy="83" r="8" fill="#ff6b6b"/>
  <circle cx="128" cy="83" r="8" fill="#ffd166"/>
  <circle cx="154" cy="83" r="8" fill="#69db7c"/>

  <rect x="238" y="68" width="246" height="32" rx="16" fill="#212532"/>
  <text x="362" y="89" text-anchor="middle" fill="#e8ecf6" font-size="18" font-weight="600" font-family="Inter, Arial, sans-serif">teletravail-service</text>

  <rect x="86" y="130" width="216" height="554" rx="18" fill="#11141d" stroke="#31364a" stroke-width="2"/>
  <text x="114" y="166" fill="#c9d0df" font-size="18" font-weight="700" font-family="Inter, Arial, sans-serif">Project</text>
  <g font-family="Inter, Arial, sans-serif" font-size="17" fill="#aab2c6">
    <text x="114" y="208">src/</text>
    <text x="132" y="242">main/</text>
    <text x="150" y="276">java/</text>
    <text x="150" y="310">resources/</text>
    <text x="132" y="344">test/</text>
    <text x="114" y="392">docs/</text>
    <text x="132" y="426">prompts/</text>
    <text x="132" y="460">workflows/</text>
  </g>
  <rect x="106" y="488" width="154" height="34" rx="10" fill="#cf0063" opacity="0.18" stroke="#ff6cae" stroke-width="1.5"/>
  <text x="183" y="511" text-anchor="middle" fill="#ffffff" font-size="16" font-weight="700" font-family="Inter, Arial, sans-serif">AGENTS.md</text>
  <rect x="106" y="540" width="166" height="34" rx="10" fill="#1e2431" stroke="#47506a" stroke-width="1.5"/>
  <text x="189" y="563" text-anchor="middle" fill="#e7ebf7" font-size="16" font-weight="700" font-family="Inter, Arial, sans-serif">README.md</text>

  <rect x="324" y="130" width="548" height="394" rx="18" fill="#11141d" stroke="#31364a" stroke-width="2"/>
  <rect x="324" y="130" width="548" height="46" rx="18" fill="#171b25"/>
  <rect x="350" y="142" width="154" height="22" rx="11" fill="#222839"/>
  <text x="427" y="158" text-anchor="middle" fill="#dfe5f2" font-size="15" font-weight="700" font-family="Inter, Arial, sans-serif">TeletravailController.java</text>
  <rect x="530" y="142" width="124" height="22" rx="11" fill="#222839"/>
  <text x="592" y="158" text-anchor="middle" fill="#9ea6bc" font-size="15" font-weight="600" font-family="Inter, Arial, sans-serif">PromptSpec.md</text>

  <g font-family="'Fira Code', 'Courier New', monospace" font-size="19">
    <text x="352" y="214" fill="#6f7994">12</text>
    <text x="392" y="214" fill="#7ecbff">public</text>
    <text x="462" y="214" fill="#ffcf70">ResponseEntity</text>
    <text x="620" y="214" fill="#e7ebf7">submitDeclaration(</text>
    <text x="352" y="250" fill="#6f7994">13</text>
    <text x="392" y="250" fill="#e7ebf7">    </text>
    <text x="430" y="250" fill="#7ecbff">@Valid</text>
    <text x="508" y="250" fill="#e7ebf7">DeclarationRequest request) {</text>
    <text x="352" y="286" fill="#6f7994">14</text>
    <text x="392" y="286" fill="#e7ebf7">        </text>
    <text x="462" y="286" fill="#ff7f9f">var</text>
    <text x="504" y="286" fill="#e7ebf7"> result = service.generatePreview(request);</text>
    <text x="352" y="322" fill="#6f7994">15</text>
    <text x="392" y="322" fill="#e7ebf7">        </text>
    <text x="462" y="322" fill="#7ecbff">return</text>
    <text x="526" y="322" fill="#e7ebf7"> ResponseEntity.ok(result);</text>
    <text x="352" y="358" fill="#6f7994">16</text>
    <text x="392" y="358" fill="#e7ebf7">}</text>
  </g>

  <rect x="392" y="388" width="324" height="86" rx="18" fill="#161a25" stroke="url(#accent)" stroke-width="2" filter="url(#glow)"/>
  <text x="416" y="422" fill="#f5b4d4" font-size="18" font-weight="700" font-family="Inter, Arial, sans-serif">Agent task</text>
  <text x="416" y="452" fill="#eef2fb" font-size="16" font-weight="500" font-family="Inter, Arial, sans-serif">Refine form validation and update UX copy</text>

  <rect x="890" y="130" width="304" height="394" rx="18" fill="#11141d" stroke="#31364a" stroke-width="2"/>
  <text x="918" y="166" fill="#c9d0df" font-size="18" font-weight="700" font-family="Inter, Arial, sans-serif">Diff / Review</text>
  <line x1="1042" y1="186" x2="1042" y2="504" stroke="#31364a" stroke-width="2"/>
  <rect x="912" y="210" width="108" height="26" rx="8" fill="#0f3322"/>
  <text x="966" y="228" text-anchor="middle" fill="#89f0b3" font-size="15" font-weight="700" font-family="Inter, Arial, sans-serif">+ add docs</text>
  <rect x="1064" y="210" width="108" height="26" rx="8" fill="#351821"/>
  <text x="1118" y="228" text-anchor="middle" fill="#ff9abc" font-size="15" font-weight="700" font-family="Inter, Arial, sans-serif">- old copy</text>
  <g font-family="'Fira Code', 'Courier New', monospace" font-size="16">
    <text x="914" y="274" fill="#89f0b3">+ docs/prompt-spec.md</text>
    <text x="914" y="306" fill="#89f0b3">+ deterministic rules</text>
    <text x="914" y="338" fill="#89f0b3">+ UX loading state</text>
    <text x="1066" y="274" fill="#ff9abc">- fuzzy assumptions</text>
    <text x="1066" y="306" fill="#ff9abc">- hidden side effects</text>
    <text x="1066" y="338" fill="#ff9abc">- manual retries</text>
  </g>

  <rect x="324" y="542" width="870" height="142" rx="18" fill="#10131b" stroke="#31364a" stroke-width="2"/>
  <text x="352" y="578" fill="#c9d0df" font-size="18" font-weight="700" font-family="Inter, Arial, sans-serif">Terminal</text>
  <g font-family="'Fira Code', 'Courier New', monospace" font-size="20">
    <text x="352" y="622" fill="#8aa0ff">$ npm run review</text>
    <text x="352" y="654" fill="#dfe5f2">agent: generated patch, tests green, diff ready for review</text>
    <text x="352" y="686" fill="#89f0b3">PASS  src/main/java/...  42 tests</text>
  </g>
</svg>
